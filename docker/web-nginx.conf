# EMORELAY web nginx 站点配置(docker compose 内 web 服务用)。
# 与 docker-compose 服务名 `panel-server` 对齐做 /api 反代。
# 若不走 compose(直接跑 web 镜像),需要把 panel-server 主机名改成可解析的。

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由:任何不存在的路径都回 index.html 让 react-router 接管。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/* 反代给 panel-server REST。
    # 注意尾斜杠对齐:proxy_pass 后无尾 / 时保留原路径前缀,符合 panel-server 期望。
    location /api/ {
        proxy_pass http://panel-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Agent 一键安装脚本与二进制分发(panel-server 路由,不在 /api 前缀下)。
    # 不反代的话会落进 SPA fallback 返回 index.html,节点一键安装链路即断。
    # X-Real-IP 供 rate limit 取真实客户端 IP,缺了限流键会退化成反代 IP,
    # 所有客户端共享同一个 60 req/min 桶。
    location /install.sh {
        proxy_pass http://panel-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /dist/ {
        proxy_pass http://panel-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 二进制下载可能较慢,放宽超时。
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # 静态资源缓存(hash 化文件名安全)。
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 健康检查(给 docker / k8s 探针用)。
    location /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
