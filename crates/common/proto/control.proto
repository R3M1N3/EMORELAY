syntax = "proto3";

package emorelay.control.v1;

// ============================================================================
// EMORELAY 主控 <-> Agent 控制平面协议。
//
// 通信模型：
//   * Agent 主动连入 panel-server gRPC 端点（PANEL_GRPC_BIND_ADDR）。
//   * Agent 先 Register（agent_token 明文，依赖 TLS 通道保密；主控用 SHA256 比对
//     nodes.agent_token_hash，不落盘明文）。生产环境必须配 TLS。
//   * RegisterResponse 颁发 session_token；后续所有 RPC 通过 gRPC metadata
//     "x-emorelay-session" 携带该 token 鉴权。
//   * Agent 通过 SubscribeCommands 订阅命令流（server-streaming）。
//   * Agent 通过 Heartbeat / ReportNodeStats / ReportRuleStats 上报。
//
// plan.md 第五节命名映射：
//   * AgentRegister / AgentHeartbeat → 这里的 Register / Heartbeat。
//   * GetRuleStats（Pull 模型）→ ReportRuleStats（client-stream Push 模型）。
//     Push 降低 Server 轮询开销；若未来需要 Pull 单条规则状态，可加
//     GetRuleStat(rule_id) 一元 RPC。
//   * CommandResponse → Ack { ok, error }，作为所有上报 / 命令确认的统一返回。
// ============================================================================

// gRPC metadata key for session_token 鉴权（panel-server 与 node-agent 必须用同名）。
// 见 panel-server::grpc 与 node-agent::control 中的常量映射。

service ControlPlane {
  rpc Register(RegisterRequest) returns (RegisterResponse);

  rpc SubscribeCommands(SubscribeRequest) returns (stream Command);

  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  rpc ReportNodeStats(stream NodeStatsBatch) returns (Ack);

  rpc ReportRuleStats(stream RuleStatsBatch) returns (Ack);

  // P1 逐段诊断:Agent 执行 Probe 命令后回报结果(按 probe_id 关联面板的等待者)。
  rpc ReportProbeResult(ProbeResult) returns (Ack);
}

// ============= Auth =============

message RegisterRequest {
  int64 node_id = 1;
  string agent_token = 2;
  string version = 3;
}

message RegisterResponse {
  string session_token = 1;
  int64 expires_at_unix = 2;
}

message SubscribeRequest {
  int64 node_id = 1;
}

// ============= Commands (Server -> Agent) =============

message Rule {
  int64 id = 1;
  string protocol = 2;          // tcp / udp / tcp_udp
  string listen_ip = 3;
  uint32 listen_port = 4;
  string target_host = 5;
  uint32 target_port = 6;
  bool enabled = 7;
  // P2 起规则级 traffic_limit_bytes(8) / bandwidth_limit_mbps(9) /
  // expires_at_unix(10) 下线:到期与流量配额归 users,带宽归 bandwidth_profiles。
  // 字段号不复用。
  reserved 8, 9, 10;
  reserved "traffic_limit_bytes", "bandwidth_limit_mbps", "expires_at_unix";
  // 关联 bandwidth_profile 的限速值。0 = 无限速。
  // server dispatch 时由 forward_rules.bandwidth_profile_id 联查得出。
  int64 bandwidth_mbps = 11;
  // P3b 多跳隧道上下文。无隧道 → None。字段号 12(11 已被 bandwidth_mbps 占)。
  TunnelContext tunnel = 12;
  // P10a 并发连接上限(仅 TCP)。0 = 不限;隧道规则仅 entry 生效(mid/exit 恒 0)。
  int64 max_connections = 13;
  // P1 协议嗅探阻断位掩码(节点级,仅普通 TCP relay 生效)。
  // bit0=http(1) bit1=tls(2) bit2=socks(4);0=不阻断。防转发被滥用为开放代理。
  uint32 blocked_protocols = 14;
  // P2 多目标负载均衡。额外目标(主目标 = target_host:target_port 仍是第 1 个);
  // 目标池 = [主目标] + extra_targets。空 = 单目标(行为不变)。
  repeated TargetEndpoint extra_targets = 15;
  // 负载策略:fifo(主备故障转移)/round(轮询)/rand(随机)/hash(客户端 IP)。
  // 仅目标数 > 1 时生效。
  string lb_strategy = 16;
}

message TargetEndpoint {
  string host = 1;
  uint32 port = 2;
}

// 多跳隧道上下文。dispatcher 按 hop 拆 Rule 时填充,告诉 Agent 自己的角色与下一跳。
message TunnelContext {
  int64 tunnel_id = 1;
  TunnelRole role = 2;
  string next_hop_addr = 3;        // 下一跳节点可达地址(public_ip)
  uint32 next_hop_inter_port = 4;  // 下一跳监听的 inter_port(自己 dial 的目标)
  uint32 self_inter_port = 5;      // 本跳监听端口(mid/exit 用;entry 监听业务 listen_port,置 0)
  string transport = 6;            // tcp / tls / wss(全链路统一)
  // 本跳在链中的序号(0=entry)。TLS/WSS 凭据目录与 dial SNI(下一跳 = self_ordinal+1)推导用。
  uint32 self_ordinal = 7;
}

enum TunnelRole {
  TUNNEL_ROLE_UNSPECIFIED = 0;
  TUNNEL_ROLE_ENTRY = 1;
  TUNNEL_ROLE_MID = 2;
  TUNNEL_ROLE_EXIT = 3;
}

// 隧道 hop 的 TLS 凭据(transport=tls/wss 时,由面板 CA 在隧道创建时签发并下发)。
// Agent 落盘到 ${AGENT_DATA_DIR}/tunnels/<id>/hop-<ordinal>/{server,client}.{pem,key}。
message TunnelCredentials {
  int64 tunnel_id = 1;
  int32 ordinal = 2;
  string server_cert_pem = 3;
  string server_key_pem = 4;
  string client_cert_pem = 5;
  string client_key_pem = 6;
  // 验证链根(面板内置 CA 公钥)。随凭据自包含下发,不依赖控制面 mTLS 是否启用/落盘。
  string ca_pem = 7;
}

message RevokeTunnelCredentials {
  int64 tunnel_id = 1;
}

message ApplyRule { Rule rule = 1; }
message RemoveRule { int64 rule_id = 1; }

// P1 逐段诊断:面板下发 Probe,Agent 对 target_host:target_port 做 count 次 TCP connect
// 计时,回报 ProbeResult(白名单指令,类同 getStats,不执行 shell、不扫描第三方目标——
// 仅探测面板已配置的转发链路节点/目标)。probe_id 关联面板的请求-响应等待者。
message Probe {
  string probe_id = 1;
  string target_host = 2;
  uint32 target_port = 3;
  uint32 count = 4;
}

message ProbeResult {
  string probe_id = 1;
  bool reachable = 2;       // 至少一次 connect 成功
  double avg_latency_ms = 3; // 成功连接的平均握手延迟
  double loss_pct = 4;       // 失败次数 / 总次数 * 100
  string error = 5;          // 全失败时的最后一个错误(便于排障)
}

// 配置对账(重连兜底):server 在 reconcile 重放完该节点应有的全部 ApplyRule 后,
// 发一条本命令携带「权威规则 id 全集」。Agent 删除本地任何不在该集合内的规则
// (断网期间被删、RemoveRule 丢失的孤儿),使数据面与面板真值收敛。空集合 = 该
// 节点不应运行任何规则,Agent 清空全部。仅在 reconcile 末尾发,不在常规 CRUD 路径。
message ReconcileRules { repeated int64 rule_ids = 1; }
message EnableRule { int64 rule_id = 1; }
message DisableRule { int64 rule_id = 1; }
message RestartRule { int64 rule_id = 1; }

// P10b Agent 一键升级。白名单固定动作:Agent 按自身 arch 从
// {base_url}/dist/node-agent-linux-<arch> 下载新二进制,校验对应 sha256(hex)
// 后原子替换自身并 exec 重启(规则已落盘,重启自动恢复)。不携带任何可执行
// 内容或 shell;sha256 不匹配/缺失一律拒绝。version 等于自身版本时幂等跳过。
message UpgradeAgent {
  string version = 1;
  string base_url = 2;
  string sha256_amd64 = 3;  // 空串 = 面板无该 arch 产物,Agent 拒绝
  string sha256_arm64 = 4;
}

message Command {
  oneof body {
    ApplyRule apply_rule = 1;
    RemoveRule remove_rule = 2;
    EnableRule enable_rule = 3;
    DisableRule disable_rule = 4;
    RestartRule restart_rule = 5;
    TunnelCredentials tunnel_credentials = 6;
    RevokeTunnelCredentials revoke_tunnel_credentials = 7;
    UpgradeAgent upgrade_agent = 8;
    ReconcileRules reconcile_rules = 9;
    Probe probe = 10;
  }
}

// ============= Heartbeat & Stats (Agent -> Server) =============

message HeartbeatRequest {
  int64 node_id = 1;
  double cpu_usage = 2;
  double memory_usage = 3;
  double load_average = 4;
}

message HeartbeatResponse {
  int64 server_time_unix = 1;
}

message NodeStatsBucket {
  int64 bucket_at_unix = 1;
  double cpu_usage = 2;
  double memory_usage = 3;
  double load_average = 4;
  int64 rx_bytes = 5;
  int64 tx_bytes = 6;
}

message NodeStatsBatch {
  int64 node_id = 1;
  repeated NodeStatsBucket buckets = 2;
}

message RuleStatsBucket {
  int64 rule_id = 1;
  int64 bucket_at_unix = 2;
  int64 rx_bytes = 3;
  int64 tx_bytes = 4;
  int64 connection_count = 5;
  int64 error_count = 6;
}

message RuleStatsBatch {
  int64 node_id = 1;
  repeated RuleStatsBucket buckets = 2;
}

message Ack {
  bool ok = 1;
  string error = 2;
}
