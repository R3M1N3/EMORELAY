# 发版构建:打 v* tag 时各架构原生编译 musl 静态二进制 + 前端产物,上传 GitHub Release。
# 用原生 runner(amd64 + arm64)分别编译,规避交叉编译 ring(C 代码)的 sysroot 难题——
# 与真机验证过的「原生 musl 编译」路径一致。资产名是 deploy.sh 快速安装的契约,改名需同步。
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            arch: amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: 安装 musl 工具链
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
          rustup target add ${{ matrix.target }}

      - name: 原生编译 panel-server + node-agent(musl 静态)
        run: cargo build --release --locked -p panel-server -p node-agent --target ${{ matrix.target }}

      - name: 重命名产物
        run: |
          mkdir -p out
          cp target/${{ matrix.target }}/release/panel-server out/panel-server-linux-${{ matrix.arch }}
          cp target/${{ matrix.target }}/release/node-agent   out/node-agent-linux-${{ matrix.arch }}
          file out/*

      - uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.arch }}
          path: out/*

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: bin-*
          merge-multiple: true
          path: dist

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 构建前端
        working-directory: web
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: 组装前端产物与校验和
        run: |
          tar czf dist/web-dist.tar.gz -C web/dist .
          chmod +x dist/panel-server-linux-* dist/node-agent-linux-*
          cd dist && sha256sum -- * > SHA256SUMS
          cat SHA256SUMS

      - name: 发布 Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3
        with:
          files: dist/*
          generate_release_notes: true
